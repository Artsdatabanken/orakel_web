# Node.js
# Build a general Node.js project with npm.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- dev

pool:
  vmImage: ubuntu-latest

steps:
- task: AzureKeyVault@2
  inputs:
    azureSubscription: 'test-deploy-code'
    KeyVaultName: 'adbtestorakelkv'
    SecretsFilter: 'ORAKEL-API-TOKEN'
    RunAsPreJob: true
  displayName: 'Fetch ORAKEL-API-TOKEN from Key Vault'

- task: NodeTool@0
  inputs:
    versionSpec: '24.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    npm run build
  displayName: 'npm install and build'
  env:
    ORAKEL_API_BASE: https://ai.test.artsdatabanken.no
    ORAKEL_API_TOKEN: $(ORAKEL-API-TOKEN)

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'build'
    ArtifactName: 'drop'
    publishLocation: 'Container'
